# Automated PR Review
# Runs on every pull request to catch issues before merge

name: PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      # Scan for leaked secrets
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  typecheck-app:
    name: Typecheck App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app
        run: npm run typecheck:app

  typecheck-api:
    name: Typecheck API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npm run typecheck:api

  typecheck-blog:
    name: Typecheck Blog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install blog dependencies
        run: npm --prefix blog ci

      - name: Typecheck blog
        run: npm run typecheck:blog

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build-app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build:app

  build-blog:
    name: Build Blog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install blog dependencies
        run: npm --prefix blog ci

      - name: Build blog
        run: npm run build:blog
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  seo-contract:
    name: SEO Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SEO inventory
        run: npm run seo:inventory -- --output-dir tmp/seo-audit/ci

      - name: Validate route ownership contract
        run: npm run seo:validate-routes

  dependency-audit-runtime:
    name: Dependency Audit (Runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high

  # Summary comment on PR
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs:
      [
        security-scan,
        lint,
        typecheck-app,
        typecheck-api,
        typecheck-blog,
        unit-tests,
        build-app,
        build-blog,
        seo-contract,
        dependency-audit-runtime,
      ]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck app: ${{ needs.typecheck-app.result }}"
          echo "Typecheck api: ${{ needs.typecheck-api.result }}"
          echo "Typecheck blog: ${{ needs.typecheck-blog.result }}"
          echo "Unit tests: ${{ needs.unit-tests.result }}"
          echo "Build app: ${{ needs.build-app.result }}"
          echo "Build blog: ${{ needs.build-blog.result }}"
          echo "SEO contract: ${{ needs.seo-contract.result }}"
          echo "Runtime dependency audit: ${{ needs.dependency-audit-runtime.result }}"
