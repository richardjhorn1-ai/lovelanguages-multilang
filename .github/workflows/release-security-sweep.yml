name: Release Security Sweep

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

jobs:
  sweep:
    name: Full Dependency and Security Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install blog dependencies
        run: npm --prefix blog ci

      - name: Run runtime dependency audit (blocking)
        run: npm audit --omit=dev --audit-level=high

      - name: Run full npm audit report (non-blocking artifact)
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
